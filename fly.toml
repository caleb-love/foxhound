app = "foxhound-api"
primary_region = "iad"

[build]

[env]
  PORT = "3001"
  HOST = "0.0.0.0"
  LOG_LEVEL = "info"
  NODE_ENV = "production"
  FOXHOUND_CLOUD = "1"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[metrics]
  port = 9091
  path = "/metrics"
