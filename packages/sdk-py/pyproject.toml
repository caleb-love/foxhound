[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "foxhound-ai"
version = "0.1.0"
description = "Foxhound observability SDK — instrument your AI agents for compliance-grade tracing"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "httpx>=0.25.0",
]

[project.optional-dependencies]
langgraph = [
    "langchain-core>=0.1.0",
]
crewai = [
    "crewai>=0.60.0",
]
openai-agents = [
    "openai-agents>=0.0.3",
]
claude-agent = [
    "claude-agent-sdk>=0.1.0",
]
autogen = [
    "ag2>=0.7.0",
]
opentelemetry = [
    "opentelemetry-api>=1.20.0",
    "opentelemetry-sdk>=1.20.0",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "respx>=0.20",
]

[project.scripts]
foxhound = "foxhound.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["foxhound"]
include = ["foxhound/static/*"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
