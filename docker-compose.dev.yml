version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fox
      POSTGRES_PASSWORD: fox
      POSTGRES_DB: fox_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fox -d fox_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
