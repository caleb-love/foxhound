version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: foxhound
      POSTGRES_PASSWORD: foxhound
      POSTGRES_DB: foxhound_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foxhound -d foxhound_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
