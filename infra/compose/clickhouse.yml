# Local ClickHouse dev stack (WP09).
#
# Single-node ClickHouse server + one play client. Pairs with the durable
# queue (WP08) to form the local analytics data plane.
#
# Usage:
#   docker compose -f infra/compose/clickhouse.yml up clickhouse
#
# Then on the API / worker hosts:
#   CLICKHOUSE_URL=http://localhost:8123
#   CLICKHOUSE_DATABASE=foxhound
#
# Run migrations (idempotent):
#   import { createAnalyticsClient, runMigrations } from "@foxhound/db-analytics";
#   const c = createAnalyticsClient();
#   await c.raw.command({ query: "CREATE DATABASE IF NOT EXISTS foxhound" });
#   await runMigrations(c);
#
# HTTP endpoint: localhost:8123 (used by `@clickhouse/client`).
# Native TCP:    localhost:9000 (used by CH clients and `clickhouse-client`).
# Play UI:       http://localhost:8123/play
services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: foxhound-clickhouse
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: foxhound
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - foxhound-clickhouse-data:/var/lib/clickhouse
      - foxhound-clickhouse-logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 5s
      retries: 10

  # Optional: one-shot migration runner. Run with:
  #   docker compose -f infra/compose/clickhouse.yml --profile migrate run --rm migrate
  # Assumes the repo is built locally (pnpm install && pnpm build).
  migrate:
    profiles: ["migrate"]
    image: node:20-alpine
    working_dir: /repo
    volumes:
      - ../../:/repo:ro
    environment:
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: foxhound
    depends_on:
      clickhouse:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        cd /repo && \
        node -e "
          const { createAnalyticsClient, runMigrations } = require('@foxhound/db-analytics');
          const c = createAnalyticsClient();
          (async () => {
            await c.raw.command({ query: 'CREATE DATABASE IF NOT EXISTS foxhound' });
            const applied = await runMigrations(c);
            console.log('applied:', applied);
            await c.close();
          })();
        "

volumes:
  foxhound-clickhouse-data:
  foxhound-clickhouse-logs:
